<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>CONSUMERTODAY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="CONSUMERTODAY is a global initiative in the industry of consumer satisfaction. Do not be scared."/>
    <meta name="robots" content="index, follow"/>
    <meta property="og:title" content="CONSUMERTODAY"/>
    <meta property="og:type" content="website"/>
    <meta property="og:image" content="./public/img/og.png"/>
    <style>
      #root {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: #4217de;
      }
      .asset {
        position: absolute;
        max-width: 100vw;
        max-height: 100vh;
      }
      .tl {
        top: 0;
        left: 0;
        max-width: 85vw;
        max-height: 30vh;
      }
      .tr {
        top: 0;
        right: 0;
        max-width: 15vw;
        max-height: 60vh;
        margin-right: -2.1vw;
      }
      .bl {
        bottom: 0;
        left: 0;
        max-width: 15vw;
        max-height: 60vh;
        margin-left: -1vw;
        margin-bottom: -1vw;
      }
      .br {
        bottom: 0;
        right: 0;
        max-width: 85vw;
        max-height: 30vh;
      }
      .ce {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        max-width: 45vw;
        min-width: 350px;
      }
    </style>
</head>
<body>
  <main id="root">
    <img class="asset tl" src="./public/svg/landing-page/CTTL.svg" alt="CONSUMERTODAY"/>
    <img class="asset tr" src="./public/svg/landing-page/CTTR.svg" alt="CONSUMERTODAY"/>
    <img class="asset bl" src="./public/svg/landing-page/CTBL.svg" alt="CONSUMERTODAY"/>
    <img class="asset br" src="./public/svg/landing-page/CTBR.svg" alt="CONSUMERTODAY"/>
    <img class="asset ce" src="./public/svg/landing-page/CTCE2.svg" alt="CONSUMERTODAY"/>
  </main>
</body>
</html>
